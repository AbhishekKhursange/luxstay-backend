spring.application.name=hotel-management-gateway
server.port=8080

# GATEWAY ROUTES

# AUTH SERVICE ROUTE
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://HOTEL-MANAGEMENT-AUTH
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

# RATE LIMITER (CORRECT WAY)
#spring.cloud.gateway.routes[0].filters[0].name=RequestRateLimiter
#spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.replenishRate=10
#spring.cloud.gateway.routes[0].filters[0].args.redis-rate-limiter.burstCapacity=20
#spring.cloud.gateway.routes[0].filters[0].args.key-resolver=#{@userKeyResolver}

# USER SERVICE ROUTE
spring.cloud.gateway.routes[1].id=user-service
spring.cloud.gateway.routes[1].uri=lb://HOTEL-MANAGEMENT-USER
spring.cloud.gateway.routes[1].predicates[0]=Path=/user/**

#spring.cloud.gateway.routes[1].filters[0].name=RequestRateLimiter
#spring.cloud.gateway.routes[1].filters[0].args.redis-rate-limiter.replenishRate=20
#spring.cloud.gateway.routes[1].filters[0].args.redis-rate-limiter.burstCapacity=40
#spring.cloud.gateway.routes[1].filters[0].args.key-resolver=#{@userKeyResolver}

#HOTEL SERVICE ROUTE
spring.cloud.gateway.routes[2].id=hotel-service
spring.cloud.gateway.routes[2].uri=lb://HOTEL-MANAGEMENT-HOTEL
spring.cloud.gateway.routes[2].predicates[0]=Path=/hotel/**

#BOOKING SERVICE ROUTE
spring.cloud.gateway.routes[3].id=booking-service
spring.cloud.gateway.routes[3].uri=lb://HOTEL-MANAGEMENT-BOOKING
spring.cloud.gateway.routes[3].predicates[0]=Path=/booking/**

#PAYMENT SERVICE ROUTE
spring.cloud.gateway.routes[4].id=payment-service
spring.cloud.gateway.routes[4].uri=lb://HOTEL-MANAGEMENT-PAYMENT
spring.cloud.gateway.routes[4].predicates[0]=Path=/payment/**

#NOTIFICATION SERVICE ROUTE
spring.cloud.gateway.routes[5].id=notification-service
spring.cloud.gateway.routes[5].uri=lb://HOTEL-MANAGEMENT-NOTIFICATION
spring.cloud.gateway.routes[5].predicates[0]=Path=/notify/**

spring.cloud.gateway.routes[6].id=room-service
spring.cloud.gateway.routes[6].uri=lb://HOTEL-MANAGEMENT-HOTEL
spring.cloud.gateway.routes[6].predicates[0]=Path=/room/**

spring.cloud.gateway.routes[7].id=upload-service
spring.cloud.gateway.routes[7].uri=lb://HOTEL-MANAGEMENT-HOTEL
spring.cloud.gateway.routes[7].predicates[0]=Path=/upload/**

# Enable discovery routing
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# REDIS (FOR BLACKLIST + RATE LIMITING)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# LOGGING (IMPORTANT FOR DEBUG)
# ===============================
logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG

jwt.secret=mysecretkeymysecretkeymysecretkey
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
